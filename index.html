<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>职业兴趣测评 - 找到适合你的方向</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 20px;
  }
  .container {
    max-width: 720px;
    width: 100%;
    background: rgba(255,255,255,0.96);
    border-radius: 24px;
    padding: 32px 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    margin-top: 20px;
    margin-bottom: 20px;
  }
  h1 {
    font-size: 26px;
    text-align: center;
    color: #333;
  }
  .subtitle {
    text-align: center;
    color: #888;
    font-size: 14px;
    margin: 8px 0 24px;
    line-height: 1.6;
  }
  .step-bar {
    display: flex;
    justify-content: space-between;
    margin-bottom: 28px;
    position: relative;
    padding: 0 10px;
  }
  .step-bar::before {
    content: '';
    position: absolute;
    top: 14px;
    left: 30px;
    right: 30px;
    height: 3px;
    background: #e0e0e0;
    border-radius: 2px;
    z-index: 0;
  }
  .step {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: #e0e0e0;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #999;
    position: relative; z-index: 1;
    transition: all 0.3s;
  }
  .step.active { background: #667eea; color: #fff; transform: scale(1.1); }
  .step.done { background: #48bb78; color: #fff; }
  .step-label {
    position: absolute; top: 36px;
    font-size: 10px; color: #aaa;
    white-space: nowrap;
    left: 50%; transform: translateX(-50%);
  }
  .step.active .step-label, .step.done .step-label { color: #667eea; font-weight: 600; }

  .screen { display: none; }
  .screen.active { display: block; }

  .question { margin-bottom: 18px; }
  .question-text {
    font-size: 16px; font-weight: 600; color: #333;
    margin-bottom: 10px; line-height: 1.5;
  }
  .options { display: flex; gap: 8px; flex-wrap: wrap; }
  .opt-btn {
    flex: 1; min-width: 56px;
    padding: 10px 8px;
    border: 2px solid #e0e0e0;
    border-radius: 12px;
    background: #fafafa;
    cursor: pointer;
    text-align: center;
    font-size: 13px; color: #666;
    transition: all 0.2s;
  }
  .opt-btn:hover { border-color: #667eea; background: #f0f2ff; }
  .opt-btn.selected { border-color: #667eea; background: #667eea; color: #fff; font-weight: 600; }
  .opt-btn input { display: none; }

  .nav-btns {
    display: flex; gap: 12px;
    margin-top: 28px;
  }
  .btn {
    flex: 1;
    padding: 14px;
    border: none; border-radius: 14px;
    font-size: 16px; font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary { background: #667eea; color: #fff; }
  .btn-primary:hover { background: #5a6fd6; transform: translateY(-1px); }
  .btn-primary:disabled { background: #ccc; cursor: not-allowed; transform: none; }
  .btn-secondary { background: #f0f0f0; color: #666; }
  .btn-secondary:hover { background: #e0e0e0; }

  .result-section {
    margin-bottom: 24px;
    padding: 20px;
    border-radius: 16px;
    background: #f8f9ff;
  }
  .result-title {
    font-size: 18px; font-weight: 700;
    margin-bottom: 12px;
  }
  .result-desc { font-size: 14px; color: #555; line-height: 1.8; }
  .badge {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    font-size: 13px; font-weight: 600;
    margin: 3px 4px;
  }
  .badge.r { background: #fecaca; color: #dc2626; }
  .badge.i { background: #fed7aa; color: #ea580c; }
  .badge.a { background: #fbd5e5; color: #e11d48; }
  .badge.s { background: #bbf7d0; color: #16a34a; }
  .badge.e { background: #fef08a; color: #ca8a04; }
  .badge.c { background: #bfdbfe; color: #2563eb; }
  .badge.d { background: #e9d5ff; color: #7c3aed; }
  .badge.f { background: #fed7d7; color: #dc2626; }

  .career-list { list-style: none; }
  .career-list li {
    padding: 10px 14px;
    margin-bottom: 8px;
    background: #fff;
    border-radius: 10px;
    border-left: 4px solid #667eea;
    font-size: 14px; color: #333;
  }
  .career-list li small { display: block; color: #999; font-size: 12px; margin-top: 3px; }

  .progress-text {
    text-align: center;
    color: #999;
    font-size: 13px;
    margin-bottom: 12px;
  }

  @media (max-width: 480px) {
    .container { padding: 20px 16px; }
    .opt-btn { min-width: 44px; padding: 8px 6px; font-size: 12px; }
    h1 { font-size: 22px; }
  }
</style>
</head>
<body>
<div class="container" id="app">
  <h1>🎯 职业方向测评</h1>
  <p class="subtitle">基于霍兰德职业兴趣理论扩展 · 8 个维度 · 帮你找到适合的专业和职业方向</p>

  <div class="step-bar" id="stepBar"></div>

  <div class="screen active" id="screen-0">
    <div style="text-align:center;padding:30px 0;">
      <div style="font-size:64px;margin-bottom:16px;">🧭</div>
      <p style="font-size:16px;color:#555;line-height:1.8;margin-bottom:24px;">
        不知道自己适合学什么专业、做什么工作？<br>
        这个测评从<strong>兴趣、技能、价值观、工作风格、学习偏好</strong><br>
        等多角度帮你全面认识自己。
      </p>
      <p style="font-size:13px;color:#999;margin-bottom:28px;">共 48 题，约 8-12 分钟</p>
      <button class="btn btn-primary" onclick="startQuiz()" style="max-width:240px;margin:0 auto;">开始测评 →</button>
    </div>
  </div>

  <div class="screen" id="screen-1">
    <div class="progress-text" id="progressText">第 1 / 48 题</div>
    <div id="questionArea"></div>
    <div class="nav-btns">
      <button class="btn btn-secondary" id="prevBtn" onclick="prevQuestion()">← 上一题</button>
      <button class="btn btn-primary" id="nextBtn" onclick="nextQuestion()">下一题 →</button>
    </div>
  </div>

  <div class="screen" id="screen-2">
    <div id="resultArea"></div>
    <div class="nav-btns" style="margin-top:12px;">
      <button class="btn btn-secondary" onclick="startQuiz()">重新测评</button>
      <button class="btn btn-primary" onclick="window.print()">🖨️ 打印/保存</button>
    </div>
  </div>
</div>

<script>
const dimNames = {
  R:'实干型', I:'研究型', A:'艺术型', S:'社会型',
  E:'企业型', C:'常规型', D:'数字型', F:'灵活型'
};
const dimColors = {
  R:'#dc2626', I:'#ea580c', A:'#e11d48', S:'#16a34a',
  E:'#ca8a04', C:'#2563eb', D:'#7c3aed', F:'#dc2626'
};
const dimOrder = ['R','I','A','S','E','C','D','F'];

const questions = [
  // 实干型 R (6题)
  { d:'R', q:'我喜欢动手修理或组装东西' },
  { d:'R', q:'我擅长使用各种工具或设备' },
  { d:'R', q:'户外作业比坐办公室更吸引我' },
  { d:'R', q:'学东西时我喜欢先动手试一遍' },
  { d:'R', q:'我对机械、电子、建筑类的东西感兴趣' },
  { d:'R', q:'我不怕脏不怕累，愿意在一线干活' },

  // 研究型 I (6题)
  { d:'I', q:'我喜欢探索事物背后的原理和规律' },
  { d:'I', q:'我擅长分析数据和解决逻辑难题' },
  { d:'I', q:'一个人静静思考问题让我很享受' },
  { d:'I', q:'我喜欢看书查资料系统学习知识' },
  { d:'I', q:'遇到问题我习惯先搞清楚原因再行动' },
  { d:'I', q:'我对科学发现和技术进步很好奇' },

  // 艺术型 A (6题)
  { d:'A', q:'我喜欢画画、写作、音乐、摄影等创作活动' },
  { d:'A', q:'我擅长用有创意的方式表达自己的想法' },
  { d:'A', q:'我不喜欢被死板的规定和流程约束' },
  { d:'A', q:'在自由有美感的环境里我学得最好' },
  { d:'A', q:'我觉得生活需要艺术和审美的点缀' },
  { d:'A', q:'我经常有与众不同的想法和点子' },

  // 社会型 S (6题)
  { d:'S', q:'我喜欢帮助别人解决困难' },
  { d:'S', q:'我擅长倾听和安慰别人' },
  { d:'S', q:'在团队中我常常是活跃气氛的那个人' },
  { d:'S', q:'和别人讨论交流时我学得最快' },
  { d:'S', q:'我希望工作能为社会做一些贡献' },
  { d:'S', q:'我喜欢参加志愿者或公益活动' },

  // 企业型 E (6题)
  { d:'E', q:'我喜欢领导团队和组织活动' },
  { d:'E', q:'我擅长说服别人和谈判沟通' },
  { d:'E', q:'我喜欢有竞争和挑战的环境' },
  { d:'E', q:'在实战和实践中我学得最好' },
  { d:'E', q:'赚钱和获得成就是我重要的动力' },
  { d:'E', q:'我不怕冒险，愿意尝试新机会' },

  // 常规型 C (6题)
  { d:'C', q:'我喜欢按计划和流程有条理地做事' },
  { d:'C', q:'我擅长整理数据和做表格' },
  { d:'C', q:'稳定的工作环境让我更有安全感' },
  { d:'C', q:'有条理地做笔记和复习效果最好' },
  { d:'C', q:'我认为遵守规则和制度很重要' },
  { d:'C', q:'我做事细心认真很少出错' },

  // 数字型 D (6题)
  { d:'D', q:'我对电脑、手机、互联网技术很感兴趣' },
  { d:'D', q:'我学新软件和新工具上手很快' },
  { d:'D', q:'我喜欢在网上搜索和学习新知识' },
  { d:'D', q:'遇到技术问题我习惯自己研究解决' },
  { d:'D', q:'我对编程、AI、短视频制作感兴趣' },
  { d:'D', q:'我认为数字技能是未来各行各业的必备' },

  // 灵活型 F (6题)
  { d:'F', q:'我兴趣广泛，不愿意只做一件事' },
  { d:'F', q:'我适应新环境和新变化很快' },
  { d:'F', q:'重复单调的工作让我很难受' },
  { d:'F', q:'我通过尝试不同方法来学习' },
  { d:'F', q:'变化和未知反而让我有点兴奋' },
  { d:'F', q:'我能同时处理好几件不同的事情' },
];

const answers = new Array(questions.length).fill(0);

const careerMap = {
  R: [
    { title:'工程技术员', desc:'机械、电子、建筑工程等领域的技术岗位' },
    { title:'汽修/维修技师', desc:'汽车维修、设备维护等实操型工作' },
    { title:'建筑施工/监理', desc:'建筑工地现场管理、质量监督' },
    { title:'电工/焊工/钳工', desc:'技术型蓝领，技能越老越吃香' },
    { title:'无人机操作/测绘', desc:'新兴技术实操岗位，前景好' },
  ],
  I: [
    { title:'数据分析师', desc:'用数据说话，互联网热门岗位' },
    { title:'实验员/质检员', desc:'科研或企业实验室检测分析' },
    { title:'程序员/软件开发', desc:'编程开发，IT行业核心岗位' },
    { title:'金融风控/银行后台', desc:'金融行业分析类岗位' },
    { title:'医学检验/医药研发', desc:'医疗健康领域技术岗' },
  ],
  A: [
    { title:'短视频编导/剪辑', desc:'短视频、直播行业内容创作' },
    { title:'平面设计/UI设计', desc:'互联网产品视觉设计' },
    { title:'新媒体运营', desc:'公众号、小红书、抖音内容运营' },
    { title:'插画师/原画师', desc:'美术创作类职业' },
    { title:'文案/广告策划', desc:'创意写作与营销策划' },
  ],
  S: [
    { title:'教师/培训师', desc:'教育培训行业，稳定有成就感' },
    { title:'人力资源HR', desc:'招聘、培训、员工关系管理' },
    { title:'护士/护理人员', desc:'医疗健康领域，社会需求大' },
    { title:'社区工作者/社工', desc:'基层服务工作，稳中有升' },
    { title:'客服/售后管理', desc:'互联网公司客户服务' },
  ],
  E: [
    { title:'市场营销/品牌推广', desc:'产品推广与品牌运营' },
    { title:'电商运营/直播运营', desc:'电商平台运营管理' },
    { title:'销售经理/商务BD', desc:'企业销售与客户开发' },
    { title:'项目管理', desc:'统筹协调各类项目推进' },
    { title:'创业者/个体经营', desc:'自己当老板' },
  ],
  C: [
    { title:'会计/出纳', desc:'财务管理相关工作，越做越精' },
    { title:'行政文员/秘书', desc:'企业日常行政办公管理' },
    { title:'银行柜员/大堂经理', desc:'银行业务操作与客户服务' },
    { title:'仓储物流管理', desc:'供应链与仓库管理' },
    { title:'公务员/事业单位', desc:'稳定的体制内工作' },
  ],
  D: [
    { title:'IT运维/网络管理', desc:'企业网络与系统维护' },
    { title:'前端开发/网页制作', desc:'网站与应用界面开发' },
    { title:'短视频运营/直播技术', desc:'直播推流、视频制作、账号运营' },
    { title:'AI训练师/数据分析', desc:'人工智能数据处理与模型训练' },
    { title:'网络安全工程师', desc:'信息安全管理，需求量大' },
  ],
  F: [
    { title:'直播主播/带货主播', desc:'直播带货，表达能力强' },
    { title:'活动策划/会展策划', desc:'各类活动统筹策划' },
    { title:'销售代表/市场推广', desc:'跑市场，挑战与收入并存' },
    { title:'自由职业者', desc:'自媒体、设计、摄影等自由发展' },
    { title:'创业合伙人', desc:'与人合伙创业，互补共赢' },
  ],
};

let currentQ = 0;

function renderStepBar() {
  const bar = document.getElementById('stepBar');
  bar.innerHTML = dimOrder.map((k, i) => {
    const firstQ = i * 6;
    const done = answers.slice(0, firstQ).every(a => a > 0);
    const active = !done && (firstQ === 0 || answers.slice(0, firstQ).every(a => a > 0)) && (firstQ === 0 || answers[firstQ - 1] > 0);
    let cls = 'step';
    if (active) cls += ' active';
    else if (done) cls += ' done';
    return `<div class="${cls}" style="background:${done?dimColors[k]:active?dimColors[k]:'#e0e0e0'};">
      ${done ? '✓' : (i + 1)}
      <span class="step-label">${dimNames[k]}</span>
    </div>`;
  }).join('');
}

function showScreen(n) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + n).classList.add('active');
}

function startQuiz() {
  for (let i = 0; i < answers.length; i++) answers[i] = 0;
  currentQ = 0;
  showScreen(1);
  renderQuestion();
}

function renderQuestion() {
  const q = questions[currentQ];
  const dim = currentQ;
  const dimNum = Math.floor(dim / 6) + 1;
  document.getElementById('progressText').textContent = `第 ${currentQ + 1} / ${questions.length} 题 · ${dimNames[q.d]}`;

  const html = `
    <div class="question">
      <div class="question-text">${q.q}</div>
      <div class="options">
        ${[1,2,3,4,5].map(v => {
          const labels = ['非常不符','不太符合','一般','比较符合','非常符合'];
          const sel = answers[currentQ] === v ? ' selected' : '';
          return `<label class="opt-btn${sel}">
            <input type="radio" name="q${currentQ}" value="${v}" ${answers[currentQ] === v ? 'checked' : ''} onchange="selectAnswer(${currentQ},${v})">
            ${labels[v-1]}
          </label>`;
        }).join('')}
      </div>
    </div>
  `;
  document.getElementById('questionArea').innerHTML = html;

  document.getElementById('prevBtn').style.display = currentQ === 0 ? 'none' : 'block';
  document.getElementById('nextBtn').textContent = currentQ === questions.length - 1 ? '查看结果 →' : '下一题 →';
  document.getElementById('nextBtn').disabled = answers[currentQ] === 0;

  renderStepBar();
}

function selectAnswer(idx, val) {
  answers[idx] = val;
  document.querySelectorAll(`input[name="q${idx}"]`).forEach(r => {
    if (+r.value === val) r.parentElement.classList.add('selected');
    else r.parentElement.classList.remove('selected');
  });
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  if (answers[currentQ] === 0) return;
  if (currentQ === questions.length - 1) { showResults(); return; }
  currentQ++;
  renderQuestion();
}

function prevQuestion() {
  if (currentQ === 0) return;
  currentQ--;
  renderQuestion();
}

function calcResults() {
  const scores = {};
  dimOrder.forEach(k => scores[k] = 0);
  questions.forEach((q, i) => {
    if (answers[i] > 0) scores[q.d] += answers[i];
  });
  const maxScore = 30;
  dimOrder.forEach(k => scores[k] = Math.round(scores[k] / maxScore * 100));
  const sorted = dimOrder.map(k => [k, scores[k]]).sort((a,b) => b[1] - a[1]);
  const top3 = sorted.slice(0, 3).map(s => s[0]);
  return { scores, sorted, top3, fullCode: top3.join('') };
}

function showResults() {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-2').classList.add('active');
  renderStepBar();

  const { scores, sorted, top3, fullCode } = calcResults();

  let radarHTML = `<div style="display:flex;flex-direction:column;gap:8px;padding:0 10px;">`;
  dimOrder.forEach(k => {
    const pct = scores[k];
    const isTop = top3.includes(k);
    radarHTML += `
      <div style="display:flex;align-items:center;gap:10px;">
        <span style="width:52px;font-size:13px;font-weight:${isTop?'700':'400'};color:${isTop?dimColors[k]:'#888'};">
          ${dimNames[k]}
        </span>
        <div style="flex:1;height:22px;background:#eee;border-radius:11px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${dimColors[k]};border-radius:11px;transition:width 1s;display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:600;">
            ${pct > 8 ? pct + '%' : ''}
          </div>
        </div>
      </div>
    `;
  });
  radarHTML += `</div>`;

  const badgesHTML = sorted.slice(0,3).map(([k,v]) =>
    `<span class="badge ${k.toLowerCase()}">${dimNames[k]} ${scores[k]}%</span>`
  ).join(' ');

  const careersHTML = top3.map(k => {
    const jobs = careerMap[k];
    return `
      <div class="result-section" style="border-left:4px solid ${dimColors[k]};">
        <div class="result-title" style="color:${dimColors[k]};">${dimNames[k]} — 推荐方向</div>
        <ul class="career-list">
          ${jobs.map(j => `<li><strong>${j.title}</strong><small>${j.desc}</small></li>`).join('')}
        </ul>
      </div>
    `;
  }).join('');
